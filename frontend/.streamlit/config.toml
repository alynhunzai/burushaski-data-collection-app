[server]
enableStaticServing = true

[theme.dark]
base = "dark"
primaryColor = "#cb785c"
backgroundColor = "#1e1c18"             # Deep warm charcoal
secondaryBackgroundColor = "#282620"    # Slightly lighter charcoal for input boxes
textColor = "#fdfdf8"                   # Off-white for high contrast text
linkColor = "#e29c85"                   # Lighter terracotta for visibility on dark
borderColor = "#4a473b"                 # Dark muted border
showWidgetBorder = true
